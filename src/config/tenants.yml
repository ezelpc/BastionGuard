tenants:
  - id: empresa-a
    name: Empresa A
    enabled: true
    apiKey: "placeholder-tenant-a"
    providers:
      - name: kubernetes
        enabled: true
        config:
          namespace: production
          kubeConfigPath: ~/.kube/config
      - name: docker-swarm
        enabled: false
        config:
          socketPath: /var/run/docker.sock
      - name: ecs
        enabled: false
        config:
          region: us-east-1
    allowedActions:
      - name: restart_service
        allowed: true
        maxConcurrency: 2
        rateLimit:
          maxPerHour: 10
          maxPerDay: 30
      - name: scale_replicas
        allowed: true
        maxConcurrency: 3
        rateLimit:
          maxPerHour: 5
          maxPerDay: 20
      - name: disable_feature_flag
        allowed: true
        maxConcurrency: 1
      - name: activate_fallback
        allowed: true
      - name: notify_slack
        allowed: true
      - name: create_alert
        allowed: true
      - name: delete_service
        allowed: false
      - name: terminate_cluster
        allowed: false
    escalationTargets:
      slack: https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK
      email:
        - ops-team@empresa-a.com
        - security@empresa-a.com
      pagerduty: YOUR_PAGERDUTY_KEY
    aiThreshold:
      minConfidence: 0.80
      maxAutoRemediate: 3

  - id: empresa-b
    name: Empresa B
    enabled: true
    apiKey: "placeholder-tenant-b"
    providers:
      - name: ecs
        enabled: true
        config:
          region: eu-west-1
          accessKeyId: ${AWS_ACCESS_KEY_ID}
          secretAccessKey: ${AWS_SECRET_ACCESS_KEY}
      - name: docker-swarm
        enabled: true
        config:
          host: tcp://swarm-manager:2375
      - name: kubernetes
        enabled: false
        config:
          namespace: default
    allowedActions:
      - name: restart_service
        allowed: true
        maxConcurrency: 3
      - name: scale_replicas
        allowed: true
        maxConcurrency: 5
      - name: disable_feature_flag
        allowed: true
      - name: activate_fallback
        allowed: true
      - name: notify_slack
        allowed: true
      - name: create_alert
        allowed: true
      - name: delete_service
        allowed: false
      - name: terminate_cluster
        allowed: false
    escalationTargets:
      slack: https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK
      email:
        - devops@empresa-b.com
    aiThreshold:
      minConfidence: 0.75
      maxAutoRemediate: 2